<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1A1A1A"/>

  <!-- Mailbox top highlight -->
  <rect x="5" y="4" width="16" height="2" fill="#888888"/>

  <!-- Mailbox body -->
  <rect x="4" y="6" width="18" height="10" rx="1" fill="#555555"/>

  <!-- Body left highlight -->
  <rect x="4" y="6" width="2" height="10" fill="#6E6E6E"/>

  <!-- Body right shadow -->
  <rect x="20" y="6" width="2" height="10" fill="#333333"/>

  <!-- Mail slot -->
  <rect x="6" y="10" width="14" height="3" fill="#111111"/>

  <!-- Letter sticking out -->
  <rect x="9" y="10.5" width="8" height="2" fill="#CCCCCC"/>
  <rect x="9" y="10.5" width="8" height="0.8" fill="#AAAAAA"/>

  <!-- Mailbox bottom shadow -->
  <rect x="4" y="16" width="18" height="2" fill="#2A2A2A"/>

  <!-- Flag pole -->
  <rect x="23" y="4" width="1.5" height="12" fill="#666666"/>

  <!-- Flag (raised) -->
  <rect x="23" y="2" width="7" height="5" fill="#AAAAAA"/>
  <rect x="23" y="2" width="7" height="1.5" fill="#CCCCCC"/>

  <!-- Center pole -->
  <rect x="14" y="18" width="2" height="10" fill="#666666"/>

  <!-- Base -->
  <rect x="10" y="28" width="12" height="2" fill="#444444"/>
  <rect x="9" y="30" width="14" height="2" fill="#2A2A2A"/>
</svg>
